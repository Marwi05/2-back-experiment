<!DOCTYPE html>
<html>
<head>
    <title>2-Back Test</title>
    <style>
        body {
            font-family: Arial;
            text-align: center;
            margin-top: 80px;
            background-color: #f2f2f2;
        }
        #stimulus {
            font-size: 80px;
            font-weight: bold;
            margin: 40px;
            opacity: 1;
            transition: opacity 0.5s ease-in-out;
        }
        #feedback {
            font-size: 24px;
            color: green;
            margin-top: 20px;
        }
        #instructions {
            font-size: 20px;
            margin: 20px;
            background-color: #fff;
            padding: 20px;
            border-radius: 12px;
            display: inline-block;
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
        }
    </style>
</head>
<body>

<div id="instructions">
    <h1>Welcome to the 2-Back Test</h1>
    <p>You will see a sequence of letters appear one at a time.</p>
    <p>Press <strong>SPACE BAR</strong> whenever the current letter matches the one from 2 steps earlier.</p>
    <p>Press SPACE to start the experiment.</p>
</div>

<div id="stimulus"></div>
<div id="feedback"></div>

<script>
let letters = "ABCDEFGHIJKLMNOPQRSTUVWXYZ";
let sequence = [];
let currentIndex = 0;
let maxTrials = 25; // 25 letters now
let interval = 2000; // total time between letters
let stimulusDuration = 1200; // how long letter is visible before fading

let subjectID = "";
let trialStartTime = 0;
let results = [["Subject","Trial","Letter","IsMatch","UserPressed","Correct","RT"]];
let userPressed = false;

// Stats
let targetMatches = 0;
let misses = 0;
let falseAlarms = 0;

// Google Sheets
let conditionName = "2-Back_Letters";
let googleWebAppUrl = "YOUR_GOOGLE_WEB_APP_URL_HERE";

// --- Instructions / start ---
document.addEventListener("keydown", startFromInstructions);
function startFromInstructions(e) {
    if (e.code === "Space") {
        e.preventDefault();
        document.getElementById("instructions").style.display = "none";
        subjectID = prompt("Enter your Subject ID:");
        if (!subjectID) {
            alert("Subject ID is required!");
            location.reload();
            return;
        }
        document.removeEventListener("keydown", startFromInstructions);
        startTask();
    }
}

// --- Task ---
function startTask() {
    sequence = [];
    currentIndex = 0;
    results = [["Subject","Trial","Letter","IsMatch","UserPressed","Correct","RT"]];
    targetMatches = 0;
    misses = 0;
    falseAlarms = 0;

    for (let i=0; i<maxTrials; i++){
        sequence.push(letters[Math.floor(Math.random()*letters.length)]);
    }

    document.addEventListener("keydown", handleKey);
    showNext();
}

function showNext() {
    if (currentIndex >= maxTrials) {
        endBlock();
        return;
    }

    userPressed = false;
    document.getElementById("feedback").innerText = "";

    let currentLetter = sequence[currentIndex];
    let stimulusDiv = document.getElementById("stimulus");
    stimulusDiv.style.opacity = 1;
    stimulusDiv.innerText = currentLetter;
    trialStartTime = Date.now();

    // Fade out after stimulusDuration
    setTimeout(() => {
        stimulusDiv.style.opacity = 0;
    }, stimulusDuration);

    // Schedule next letter after interval
    setTimeout(() => {
        logTrial();
        currentIndex++;
        showNext();
    }, interval);
}

function handleKey(e) {
    if (e.code === "Space") {
        e.preventDefault();
        userPressed = true;
    }
}

// --- Log trial ---
function logTrial() {
    let currentLetter = sequence[currentIndex];
    let isMatch = currentIndex >= 2 && currentLetter === sequence[currentIndex-2];
    let correct = (isMatch && userPressed) || (!isMatch && !userPressed);

    if (isMatch && userPressed) targetMatches++;
    if (isMatch && !userPressed) misses++;
    if (!isMatch && userPressed && !isMatch) falseAlarms++;

    let rt = userPressed ? Date.now() - trialStartTime : "";

    results.push([
        subjectID,
        currentIndex,
        currentLetter,
        isMatch,
        userPressed,
        correct,
        rt
    ]);
}

// --- End block ---
function endBlock() {
    document.removeEventListener("keydown", handleKey);
    document.getElementById("stimulus").innerText = "";

    document.getElementById("feedback").innerHTML = `
        <h3>Block Complete</h3>
        <p>Subject: ${subjectID}</p>
        <p>There were ${maxTrials} trials in total.</p>
        <p>Target matches: ${targetMatches} | Misses: ${misses} | False alarms: ${falseAlarms}</p>
        <p><em>Saving your data securely to the server. Please wait...</em></p>
    `;

    sendDataToGoogleSheets();
}

// --- Google Sheets ---
function sendDataToGoogleSheets() {
    let finalData = results.map((row,index)=>{
        if (index===0) return ["Condition",...row];
        return [conditionName,...row];
    });

    fetch(googleWebAppUrl,{
        method:"POST",
        body:JSON.stringify(finalData),
        headers:{"Content-Type":"text/plain;charset=utf-8"}
    })
    .then(response=>{
        document.getElementById("feedback").innerHTML += `<p style="color:green;"><strong>✅ Data saved successfully!</strong></p>`;
    })
    .catch(error=>{
        console.error("Error:",error);
        document.getElementById("feedback").innerHTML += `
            <p style="color:red;"><strong>⚠️ Error saving data automatically. Click below to download CSV.</strong></p>
            <button onclick="downloadCSV()">Download CSV</button>
        `;
    });
}

// --- CSV fallback ---
function downloadCSV() {
    let csvContent = "data:text/csv;charset=utf-8," + results.map(e=>e.join(",")).join("\n");
    let link = document.createElement("a");
    link.setAttribute("href", encodeURI(csvContent));
    link.setAttribute("download", `${subjectID}_results.csv`);
    document.body.appendChild(link);
    link.click();
    document.body.removeChild(link);
}

</script>
</body>
</html>
