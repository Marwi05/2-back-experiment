<!DOCTYPE html>
<html>
<head>
    <title>2-Back Test</title>
    <style>
        /* Centering the entire experiment in the viewport */
        html, body {
            height: 100%;
            margin: 0;
            padding: 0;
            background-color: #f2f2f2;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            font-family: Arial, sans-serif;
        }

        #stimulus {
            font-size: 100px;
            font-weight: 900;
            color: black; /* Changed from gray to black */
            height: 120px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #feedback {
            font-size: 24px;
            color: green;
            margin-top: 20px;
            position: absolute;
            bottom: 20%;
        }
        
        /* Ensure instructions are HIDDEN on start */
        .screen {
            display: none; 
            font-size: 20px;
            background-color: #fff;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            width: fit-content;
            max-width: 600px;
            text-align: center;
        }

        /* Show only the subject screen initially */
        #subject-screen {
            display: block; 
        }

        input[type="text"] {
            font-size: 18px;
            padding: 10px;
            width: 250px;
            margin-bottom: 15px;
            border: 1px solid #ccc;
            border-radius: 4px;
        }

        button {
            font-size: 18px;
            padding: 10px 25px;
            cursor: pointer;
            background-color: #4CAF50;
            color: white;
            border: none;
            border-radius: 4px;
            transition: background 0.3s;
        }

        button:hover {
            background-color: #45a049;
        }
    </style>
</head>
<body>

<div id="subject-screen" class="screen">
    <h2>Enter Subject ID</h2>
    <input type="text" id="subject-input" placeholder="sub-100">
    <br>
    <button id="to-instructions">Go to Instructions</button>
</div>

<div id="instructions" class="screen">
    <h1>2-Back Test</h1>
    <p>Letters will appear one at a time.</p>
    <p>Press <strong>"M"</strong> if the current letter matches the one from <strong>2 steps ago</strong>.</p>
    <br>
    <p>Press <strong>SPACE BAR</strong> to start.</p>
</div>

<div id="stimulus"></div>
<div id="feedback"></div>

<script>
let letters = "ABCDEFGHIJKLMNOPQRSTUVWXYZ";
let sequence = [];
let currentIndex = 0;
let maxTrials = 25;
let trialDuration = 1500; 

let subjectID = "";
let trialStartTime = 0;
let results = [["Subject","Trial","Letter","IsMatch","UserPressed","Correct","RT"]];
let userPressed = false;

let targetMatches = 0;
let misses = 0;
let falseAlarms = 0;

let conditionName = "2-Back_Letters";
let googleWebAppUrl = "YOUR_GOOGLE_WEB_APP_URL_HERE";

const subjectScreen = document.getElementById("subject-screen");
const instructionsScreen = document.getElementById("instructions");

document.getElementById("to-instructions").addEventListener("click", () => {
    let input = document.getElementById("subject-input").value.trim();
    if (!input) {
        alert("Please enter a Subject ID!");
        return;
    }
    subjectID = input;
    
    subjectScreen.style.display = "none";
    // instructionsScreen.style.display = "block";

    document.addEventListener("keydown", startFromInstructions);
});

function startFromInstructions(e) {
    if (e.code === "Space") {
        e.preventDefault();
        instructionsScreen.style.display = "none";
        document.removeEventListener("keydown", startFromInstructions);
        startTask();
    }
}

function startTask() {
    sequence = [];
    currentIndex = 0;
    results = [["Subject","Trial","Letter","IsMatch","UserPressed","Correct","RT"]];
    
    for (let i=0; i<maxTrials; i++){
        sequence.push(letters[Math.floor(Math.random()*letters.length)]);
    }

    document.addEventListener("keydown", handleKey);
    showNext();
}

function showNext() {
    if (currentIndex >= maxTrials) {
        endBlock();
        return;
    }

    userPressed = false;
    document.getElementById("feedback").innerText = "";

    let currentLetter = sequence[currentIndex];
    let stimulusDiv = document.getElementById("stimulus");

    stimulusDiv.innerText = currentLetter;
    trialStartTime = Date.now();

    // Flash letter for 500ms
    setTimeout(() => {
        stimulusDiv.innerText = "";
    }, 500);

    // Trial timing updated to 2 seconds total
    setTimeout(() => {
        logTrial();
        currentIndex++;
        showNext();
    }, trialDuration);
}

function handleKey(e) {
    if (e.code === "KeyM") {
        userPressed = true;
    }
}

function logTrial() {
    let currentLetter = sequence[currentIndex];
    let isMatch = currentIndex >= 2 && currentLetter === sequence[currentIndex-2];
    let correct = (isMatch && userPressed) || (!isMatch && !userPressed);

    if (isMatch && userPressed) targetMatches++;
    if (isMatch && !userPressed) misses++;
    if (!isMatch && userPressed) falseAlarms++;

    let rt = userPressed ? Date.now() - trialStartTime : "";

    results.push([subjectID, currentIndex, currentLetter, isMatch, userPressed, correct, rt]);
}

function endBlock() {
    document.removeEventListener("keydown", handleKey);
    document.getElementById("stimulus").innerText = "";

    document.getElementById("feedback").innerHTML = `
        <div class="screen" style="display:block;">
            <h3>Block Complete</h3>
            <p>Subject: ${subjectID}</p>
            <p>Target matches: ${targetMatches} | Misses: ${misses} | False alarms: ${falseAlarms}</p>
            <p><em>Saving data...</em></p>
        </div>
    `;

    sendDataToGoogleSheets();
}

function sendDataToGoogleSheets() {
    let finalData = results.map((row,index)=>{
        if (index===0) return ["Condition",...row];
        return [conditionName,...row];
    });

    fetch(googleWebAppUrl,{
        method:"POST",
        body:JSON.stringify(finalData),
        headers:{"Content-Type":"text/plain;charset=utf-8"}
    })
    .then(response=>{
        document.getElementById("feedback").innerHTML += `<p style="color:green;"><strong>✅ Data saved!</strong></p>`;
    })
    .catch(error=>{
        document.getElementById("feedback").innerHTML += `
            <p style="color:red;"><strong>⚠️ Error.</strong></p>
            <button onclick="downloadCSV()">Download CSV</button>
        `;
    });
}

function downloadCSV() {
    let csvContent = "data:text/csv;charset=utf-8," + results.map(e=>e.join(",")).join("\n");
    let link = document.createElement("a");
    link.setAttribute("href", encodeURI(csvContent));
    link.setAttribute("download", `${subjectID}_results.csv`);
    document.body.appendChild(link);
    link.click();
    document.body.removeChild(link);
}
</script>
</body>
</html>
