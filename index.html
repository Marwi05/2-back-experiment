<!DOCTYPE html>
<html>
<head>
    <title>2-Back Test</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            margin-top: 80px;
            background-color: #f2f2f2;
        }
        #stimulus {
            font-size: 80px;
            font-weight: bold;
            margin: 40px;
        }
        #feedback {
            font-size: 24px;
            color: green;
            margin-top: 20px;
        }
        .screen {
            display: none;
        }
        #subject-screen, #instructions {
            font-size: 20px;
            margin: 20px auto;
            background-color: #fff;
            padding: 20px;
            border-radius: 12px;
            display: inline-block;
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
        }
        input[type="text"] {
            font-size: 18px;
            padding: 8px;
            width: 200px;
        }
        button {
            font-size: 18px;
            padding: 8px 20px;
            margin-top: 15px;
            cursor: pointer;
        }
    </style>
</head>
<body>

<!-- Subject ID Screen -->
<div id="subject-screen" class="screen" style="display:block;">
    <h2>Enter Subject ID</h2>
    <input type="text" id="subject-input" placeholder="sub-100">
    <br>
    <button id="to-instructions">Go to Instructions</button>
</div>

<!-- Instructions Screen -->
<div id="instructions" class="screen">
    <h1>Welcome to the 2-Back Test</h1>
    <p>You will see a sequence of letters appear one at a time.</p>
    <p>Press the <strong>M key</strong> whenever the current letter matches the one from 2 steps earlier.</p>
    <p>Press <strong>SPACE BAR</strong> to start the experiment.</p>
</div>

<!-- Stimulus & Feedback -->
<div id="stimulus"></div>
<div id="feedback"></div>

<script>
let letters = "ABCDEFGHIJKLMNOPQRSTUVWXYZ";
let sequence = [];
let currentIndex = 0;
let maxTrials = 25;

let subjectID = "";
let trialStartTime = 0;
let results = [["Subject","Trial","Letter","IsMatch","UserPressed","Correct","RT"]];
let userPressed = false;

// Stats
let targetMatches = 0;
let misses = 0;
let falseAlarms = 0;

// Google Sheets
let conditionName = "2-Back_Letters";
let googleWebAppUrl = "YOUR_GOOGLE_WEB_APP_URL_HERE";

// --- SCREEN NAVIGATION ---
const subjectScreen = document.getElementById("subject-screen");
const instructionsScreen = document.getElementById("instructions");

document.getElementById("to-instructions").addEventListener("click", () => {
    let input = document.getElementById("subject-input").value.trim();
    if (!input) {
        alert("Please enter a Subject ID!");
        return;
    }
    subjectID = input;
    subjectScreen.style.display = "none";
    instructionsScreen.style.display = "block";

    // Wait for SPACE to start experiment
    document.addEventListener("keydown", startFromInstructions);
});

function startFromInstructions(e) {
    if (e.code === "Space") {
        e.preventDefault();
        instructionsScreen.style.display = "none";
        document.removeEventListener("keydown", startFromInstructions);
        startTask();
    }
}

// --- TASK ---
function startTask() {
    sequence = [];
    currentIndex = 0;
    results = [["Subject","Trial","Letter","IsMatch","UserPressed","Correct","RT"]];
    targetMatches = 0;
    misses = 0;
    falseAlarms = 0;

    for (let i=0; i<maxTrials; i++){
        sequence.push(letters[Math.floor(Math.random()*letters.length)]);
    }

    document.addEventListener("keydown", handleKey);
    showNext();
}

// --- SHOW NEXT LETTER ---
function showNext() {
    if (currentIndex >= maxTrials) {
        endBlock();
        return;
    }

    userPressed = false;
    document.getElementById("feedback").innerText = "";

    let currentLetter = sequence[currentIndex];
    let stimulusDiv = document.getElementById("stimulus");

    // SHOW LETTER FOR 500ms
    stimulusDiv.innerText = currentLetter;
    trialStartTime = Date.now();

    setTimeout(() => {
        // CLEAR LETTER AFTER 500ms
        stimulusDiv.innerText = "";
    }, 500);

    // LOG TRIAL AND MOVE TO NEXT AFTER 3,000ms TOTAL
    setTimeout(() => {
        logTrial();
        currentIndex++;
        showNext();
    }, 3000);
}

// --- KEY RESPONSE ---
function handleKey(e) {
    if (e.code === "KeyM") userPressed = true;
}

// --- LOG TRIAL ---
function logTrial() {
    let currentLetter = sequence[currentIndex];
    let isMatch = currentIndex >= 2 && currentLetter === sequence[currentIndex-2];
    let correct = (isMatch && userPressed) || (!isMatch && !userPressed);

    if (isMatch && userPressed) targetMatches++;
    if (isMatch && !userPressed) misses++;
    if (!isMatch && userPressed) falseAlarms++;

    let rt = userPressed ? Date.now() - trialStartTime : "";

    results.push([
        subjectID,
        currentIndex,
        currentLetter,
        isMatch,
        userPressed,
        correct,
        rt
    ]);
}

// --- END BLOCK ---
function endBlock() {
    document.removeEventListener("keydown", handleKey);
    document.getElementById("stimulus").innerText = "";

    document.getElementById("feedback").innerHTML = `
        <h3>Block Complete</h3>
        <p>Subject: ${subjectID}</p>
        <p>There were ${maxTrials} trials in total.</p>
        <p>Target matches: ${targetMatches} | Misses: ${misses} | False alarms: ${falseAlarms}</p>
        <p><em>Saving your data securely to the server. Please wait...</em></p>
    `;

    sendDataToGoogleSheets();
}

// --- GOOGLE SHEETS ---
function sendDataToGoogleSheets() {
    let finalData = results.map((row,index)=>{
        if (index===0) return ["Condition",...row];
        return [conditionName,...row];
    });

    fetch(googleWebAppUrl,{
        method:"POST",
        body:JSON.stringify(finalData),
        headers:{"Content-Type":"text/plain;charset=utf-8"}
    })
    .then(response=>{
        document.getElementById("feedback").innerHTML += `<p style="color:green;"><strong>✅ Data saved successfully!</strong></p>`;
    })
    .catch(error=>{
        console.error("Error:",error);
        document.getElementById("feedback").innerHTML += `
            <p style="color:red;"><strong>⚠️ Error saving data automatically. Click below to download CSV.</strong></p>
            <button onclick="downloadCSV()">Download CSV</button>
        `;
    });
}

// --- CSV fallback ---
function downloadCSV() {
    let csvContent = "data:text/csv;charset=utf-8," + results.map(e=>e.join(",")).join("\n");
    let link = document.createElement("a");
    link.setAttribute("href", encodeURI(csvContent));
    link.setAttribute("download", `${subjectID}_results.csv`);
    document.body.appendChild(link);
    link.click();
    document.body.removeChild(link);
}
</script>
</body>
</html>
